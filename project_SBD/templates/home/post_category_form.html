{% extends 'base.html' %}
{% block content %}

<div class="container" style="margin-top:100px; max-width:600px;">

    <h4 class="fw-bold mb-3">{{ title }}</h4>

    <form method="POST" class="card p-4 shadow-sm">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Tên danh mục</label>
            <input class="form-control" name="name" value="{{ category.name|default:'' }}" placeholder="Ví dụ: Tin công ty" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Slug (không bắt buộc)</label>
            <input class="form-control" name="slug" value="{{ category.slug|default:'' }}" placeholder="tin-cong-ty">
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="is_hidden" id="is_hidden" {% if category and category.is_hidden %}checked{% endif %}>
            <label class="form-check-label" for="is_hidden">Ẩn khỏi danh sách chọn</label>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a href="{% url 'post_category_list' %}" class="btn btn-secondary">Quay lại</a>
            <button class="btn btn-primary">Lưu</button>
        </div>
    </form>

</div>

{% endblock %}
