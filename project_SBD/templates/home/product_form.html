{% extends 'base.html' %}
{% block content %}

<div class="container" style="margin-top:100px; max-width:600px;">

    <h2>{% if product %}Sửa{% else %}Thêm{% endif %} Sản Phẩm</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="name"
               value="{{ product.name|default:'' }}"
               placeholder="Tên sản phẩm"
               class="form-control mb-2">

        <textarea name="description"
                  class="form-control mb-2"
                  placeholder="Mô tả">{{ product.description|default:'' }}</textarea>

        <select name="category" class="form-control mb-2" required>
            <option value="" disabled {% if not product %}selected{% endif %}>-- Chọn danh mục --</option>
            {% for c in categories %}
                <option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>
                    {{ c.name }}
                </option>
            {% endfor %}
        </select>

        <input type="file" name="image" class="form-control mb-2">

        {% if product.image %}
            <img src="{{ product.image.url }}" width="120" alt="{{ product.name }}">
        {% endif %}

        <div class="d-flex justify-content-between align-items-center mt-2">
            <a href="{% url 'product_list' %}" class="btn btn-secondary">Quay lại</a>
            <button class="btn btn-primary">Lưu</button>
        </div>

    </form>

</div>

{% endblock %}
