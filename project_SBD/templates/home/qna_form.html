{% extends 'base.html' %}
{% block content %}

<div class="container" style="margin-top:100px; max-width:700px;">

    <h2>{% if qna %}Sửa{% else %}Thêm{% endif %} Câu Hỏi</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="question"
               value="{{ qna.question|default:'' }}"
               placeholder="Câu hỏi"
               class="form-control mb-2"
               required>

        <textarea name="answer"
                  class="form-control mb-2"
                  rows="3"
                  placeholder="Địa chỉ">{{ qna.answer|default:'' }}</textarea>

        <div class="d-flex justify-content-between align-items-center mt-2">
            <a href="{% url 'qna_list' %}" class="btn btn-secondary">Quay lại</a>
            <button class="btn btn-primary">Lưu</button>
        </div>

    </form>

</div>

{% endblock %}
