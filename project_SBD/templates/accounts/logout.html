{% extends 'base.html' %}
{% block content %}

<div class="container" style="margin-top:110px; max-width: 560px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
            <h3 class="mb-2" style="color:var(--primary); font-weight:800;">Đăng xuất</h3>
            <p class="text-muted mb-4">Bạn có chắc muốn đăng xuất khỏi hệ thống?</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary w-50">Hủy</a>
                    <button class="btn btn-danger w-50" type="submit">Đăng xuất</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
